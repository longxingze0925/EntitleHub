openapi: 3.0.3
info:
  title: User Administration Platform API
  version: 0.1.0
  description: |
    Route-level OpenAPI contract for the backend service.

    This file tracks registered paths, HTTP methods, authentication schemes,
    common response envelopes, and path/query parameters. Field-level request
    and response details remain documented in ../API接口文档.md.
servers:
  - url: http://127.0.0.1:8080
    description: Local development backend
tags:
  - name: platform
  - name: jwks
  - name: internal
  - name: admin-auth
  - name: admin
  - name: ai-gateway
  - name: client-ai
  - name: server-ai
  - name: server-web
  - name: client-auth
  - name: client
paths:
  /health:
    get:
      tags: [platform]
      summary: Health check
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /healthz:
    get:
      tags: [platform]
      summary: Health check alias
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /readyz:
    get:
      tags: [platform]
      summary: Readiness check
      responses:
        "200":
          $ref: "#/components/responses/Health"
        default:
          $ref: "#/components/responses/ApiError"
  /metrics:
    get:
      tags: [platform]
      summary: Prometheus metrics
      responses:
        "200":
          $ref: "#/components/responses/MetricsText"
  /.well-known/jwks.json:
    get:
      tags: [jwks]
      summary: Global JWT signing JWKS
      responses:
        "200":
          $ref: "#/components/responses/Jwks"
        default:
          $ref: "#/components/responses/ApiError"
  /api/client/apps/{app_key}/jwks:
    parameters:
      - $ref: "#/components/parameters/AppKeyPath"
    get:
      tags: [jwks]
      summary: Application signing JWKS
      responses:
        "200":
          $ref: "#/components/responses/Jwks"
        default:
          $ref: "#/components/responses/ApiError"

  /api/internal/alertmanager/webhook:
    post:
      tags: [internal]
      summary: Receive Alertmanager webhook and deliver configured notification channels
      security:
        - AlertmanagerBearer: []
      requestBody:
        $ref: "#/components/requestBodies/AlertmanagerWebhook"
      responses:
        "200":
          $ref: "#/components/responses/AlertDelivery"
        default:
          $ref: "#/components/responses/ApiError"

  /api/ai/assets/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [ai-gateway]
      summary: Public cached AI asset download URL
      responses:
        "200":
          description: Cached AI-generated asset bytes
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/ApiError"

  /v1/chat/completions:
    post:
      tags: [ai-gateway]
      summary: OpenAI-compatible chat completion gateway with EntitleHub API key billing
      security:
        - AiApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                model:
                  type: string
                prompt:
                  type: string
                ratio:
                  type: string
                aspectRatio:
                  type: string
                resolution:
                  type: string
                duration:
                  type: integer
                durationSec:
                  type: integer
                inputMode:
                  type: string
                  enum: [text, image, video, frames]
                referenceAssetIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                firstFrameAssetId:
                  type: string
                  format: uuid
                lastFrameAssetId:
                  type: string
                  format: uuid
                referenceAssets:
                  type: array
                  items:
                    type: object
                    required: [assetId]
                    properties:
                      assetId:
                        type: string
                        format: uuid
                      kind:
                        type: string
                        enum: [image, video]
                      role:
                        type: string
                        enum: [reference, first_frame, last_frame]
      responses:
        "200":
          description: Provider-compatible chat completion response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /v1/embeddings:
    post:
      tags: [ai-gateway]
      summary: OpenAI-compatible embeddings gateway with EntitleHub API key billing
      security:
        - AiApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible embeddings response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /v1/images/generations:
    post:
      tags: [ai-gateway]
      summary: OpenAI-compatible image generation gateway with EntitleHub API key billing and asset caching
      security:
        - AiApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible image generation response with cached EntitleHub asset URLs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /v1/videos/generations:
    post:
      tags: [ai-gateway]
      summary: OpenAI-compatible video generation gateway with EntitleHub API key billing and asset caching
      security:
        - AiApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible video generation response with cached EntitleHub asset URLs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /v1/models:
    get:
      tags: [ai-gateway]
      summary: OpenAI-compatible model list for enabled EntitleHub AI models
      security:
        - AiApiKey: []
      responses:
        "200":
          description: Provider-compatible model list response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"

  /api/server/ai/v1/chat/completions:
    post:
      tags: [server-ai]
      summary: Server-to-server chat completion gateway with customer subscription and wallet billing
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible chat completion response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/embeddings:
    post:
      tags: [server-ai]
      summary: Server-to-server embeddings gateway with customer subscription and wallet billing
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible embeddings response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/images/generations:
    post:
      tags: [server-ai]
      summary: Server-to-server image generation gateway with asset caching and wallet billing
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible image generation response with cached EntitleHub asset URLs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/images/jobs:
    post:
      tags: [server-ai]
      summary: Create asynchronous image generation job
      description: Reserves customer wallet balance, submits an async image task to the configured provider, and returns the EntitleHub job state.
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Wrapped Web AI generation job list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAiGenerationJobListEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/videos/generations:
    post:
      tags: [server-ai]
      summary: Server-to-server video generation gateway with asset caching and wallet billing
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Provider-compatible video generation response with cached EntitleHub asset URLs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/videos/jobs:
    post:
      tags: [server-ai]
      summary: Create asynchronous video generation job
      description: Reserves customer wallet balance, submits an async video task to the configured provider, and returns the EntitleHub job state.
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Wrapped Web AI generation job response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAiGenerationJobEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/jobs/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [server-ai]
      summary: Get asynchronous AI generation job
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      responses:
        "200":
          description: Wrapped Web AI generation job response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAiGenerationJobEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/ai/v1/models:
    get:
      tags: [server-ai]
      summary: Server-to-server model list for enabled EntitleHub AI models
      security:
        - ServerApiKey: []
          ServerCustomerId: []
      responses:
        "200":
          description: Provider-compatible model list response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"

  /api/server/web/v1/customers/register:
    post:
      tags: [server-web]
      summary: Register Web product customer through server-to-server API
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Wrapped Web AI generation job response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAiGenerationJobEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/customers/login:
    post:
      tags: [server-web]
      summary: Verify Web product customer credentials through server-to-server API
      description: EntitleHub validates the customer password and returns customer identity; the Web product backend owns its browser session.
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Wrapped Web AI generation job response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAiGenerationJobEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/customers/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [server-web]
      summary: Get Web product customer identity
      security:
        - ServerApiKey: []
      responses:
        "200":
          description: Wrapped Web customer asset list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCustomerAssetListEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/customers/{id}/balance:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [server-web]
      summary: Get Web product customer AI wallet balance
      security:
        - ServerApiKey: []
      responses:
        "200":
          description: Wrapped Web customer asset response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCustomerAssetEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/customers/{id}/usage:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/PageQuery"
      - $ref: "#/components/parameters/PageSizeQuery"
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, running, succeeded, failed, refunded]
    get:
      tags: [server-web]
      summary: List Web product customer AI usage records
      security:
        - ServerApiKey: []
      responses:
        "200":
          description: Wrapped Web work list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebWorkListEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/customers/{id}/plan:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [server-web]
      summary: Get Web product customer active plan for the Server Key application
      security:
        - ServerApiKey: []
      responses:
        "200":
          description: Wrapped Web work list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebWorkListEnvelope"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/ai/models:
    get:
      tags: [server-web]
      summary: List enabled AI model products for Web product backend
      description: Does not require a customer id; use this to render model options before a customer starts a generation task.
      security:
        - ServerApiKey: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [text, image, video, audio, embedding, multimodal]
      responses:
        "200":
          description: Provider-compatible model list response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/ai/jobs:
    get:
      tags: [server-web]
      summary: List Web product AI generation jobs for a customer
      security:
        - ServerApiKey: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [image, video]
        - name: status
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
    post:
      tags: [server-web]
      summary: Create unified image or video generation job for Web product backend
      security:
        - ServerApiKey: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, type, model]
              additionalProperties: true
              properties:
                customer_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [image, video]
                model:
                  type: string
                prompt:
                  type: string
                ratio:
                  type: string
                aspectRatio:
                  type: string
                resolution:
                  type: string
                duration:
                  type: integer
                durationSec:
                  type: integer
                inputMode:
                  type: string
                  enum: [text, image, video, frames]
                referenceAssetIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                firstFrameAssetId:
                  type: string
                  format: uuid
                lastFrameAssetId:
                  type: string
                  format: uuid
                referenceAssets:
                  type: array
                  items:
                    type: object
                    required: [assetId]
                    properties:
                      assetId:
                        type: string
                        format: uuid
                      kind:
                        type: string
                        enum: [image, video]
                      role:
                        type: string
                        enum: [reference, first_frame, last_frame]
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/ai/jobs/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - name: customer_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [server-web]
      summary: Get Web product AI generation job
      security:
        - ServerApiKey: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/ai/jobs/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    post:
      tags: [server-web]
      summary: Cancel Web product AI generation job locally and release uncharged hold
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id:
                  type: string
                  format: uuid
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/ai/jobs/{id}/retry:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    post:
      tags: [server-web]
      summary: Retry polling a Web product AI generation job
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id:
                  type: string
                  format: uuid
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/asset-folders:
    get:
      tags: [server-web]
      summary: List Web product customer asset folders
      security:
        - ServerApiKey: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: parent_id
          in: query
          required: false
          schema:
            type: string
            description: UUID, root, null, or omitted for all folders
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
    post:
      tags: [server-web]
      summary: Create Web product customer asset folder
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, name]
              properties:
                customer_id:
                  type: string
                  format: uuid
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                name:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/asset-folders/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    patch:
      tags: [server-web]
      summary: Update Web product customer asset folder
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
    delete:
      tags: [server-web]
      summary: Delete empty Web product customer asset folder
      security:
        - ServerApiKey: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/assets/upload-url:
    post:
      tags: [server-web]
      summary: Create short-lived Web product asset upload URL and token
      description: Server Key creates the upload session; browser or product backend uploads bytes with X-EntitleHub-Upload-Token.
      security:
        - ServerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, file_name]
              properties:
                customer_id:
                  type: string
                  format: uuid
                folder_id:
                  type: string
                  format: uuid
                  nullable: true
                file_name:
                  type: string
                asset_type:
                  type: string
                  enum: [image, video, audio, file]
                  description: Legacy asset type field. Either asset_type or kind is required.
                kind:
                  type: string
                  enum: [image, video, audio, file]
                  description: Web-friendly alias for asset_type. Either kind or asset_type is required.
                asset_role:
                  type: string
                  enum: [upload, reference, first_frame, last_frame, brand, other]
                mime_type:
                  type: string
                file_size:
                  type: integer
                  format: int64
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/ApiError"
  /api/server/web/v1/assets/upload:
    post:
      tags: [server-web]
      summary: Upload a Web product asset in one request
      description: Product backend can use this for small files; two-step upload remains recommended for large objects.
      security:
        - ServerApiKey: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: folder_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: file_name
          in: query
          required: true
          schema:
            type: string
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            enum: [image, video, audio, file]
          description: Legacy asset type field. Either asset_type or kind is required.
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [image, video, audio, file]
          description: Web-friendly alias for asset_type. Either kind or asset_type is required.
        - name: asset_role
          in: query
          required: false
          schema:
            type: string
            enum: [upload, reference, first_frame, last_frame, brand, other]
        - name: mime_type
          in: query
          required: false
