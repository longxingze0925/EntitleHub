      description: Wrapped successful API response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
    ApiError:
      description: Wrapped error API response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
  schemas:
    ApiEnvelope:
      type: object
      required: [code, message, data, request_id]
      properties:
        code:
          type: integer
          format: int32
          example: 0
        errorCode:
          type: string
          nullable: true
          description: Stable string error code on error responses. Usually omitted on success.
          example: model_not_support_reference_video
        message:
          type: string
          example: ok
        data:
          nullable: true
          description: Endpoint-specific payload. See ../API接口文档.md.
        request_id:
          type: string
          example: req_01HX0000000000000000000000
    WebPagination:
      type: object
      required: [page, page_size, pageSize, hasMore]
      properties:
        page:
          type: integer
          format: int64
          example: 1
        page_size:
          type: integer
          format: int64
          example: 20
        pageSize:
          type: integer
          format: int64
          example: 20
        hasMore:
          type: boolean
          example: false
    WebAsset:
      type: object
      required: [id, name, kind, asset_type, status, source, sourceAlias, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [image, video, audio, file]
        asset_type:
          type: string
          enum: [image, video, audio, file]
        asset_role:
          type: string
        status:
          type: string
          example: ready
        url:
          type: string
          nullable: true
        public_url:
          type: string
          nullable: true
        mimeType:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        duration:
          type: integer
          format: int64
          nullable: true
        durationSec:
          type: integer
          format: int64
          nullable: true
        durationSeconds:
          type: integer
          format: int64
          nullable: true
        source:
          type: string
        sourceAlias:
          type: string
          example: ai
        createdAt:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    WebCustomerAssetListEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, assets, meta, pagination]
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/WebAsset"
                assets:
                  type: array
                  items:
                    $ref: "#/components/schemas/WebAsset"
                meta:
                  $ref: "#/components/schemas/WebPagination"
                pagination:
                  $ref: "#/components/schemas/WebPagination"
    WebCustomerAssetEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [asset, assetId, kind]
              properties:
                asset:
                  $ref: "#/components/schemas/WebAsset"
                assetId:
                  type: string
                  format: uuid
                url:
                  type: string
                  nullable: true
                type:
                  type: string
                kind:
                  type: string
                mimeType:
                  type: string
                  nullable: true
                thumbnailUrl:
                  type: string
                  nullable: true
                duration:
                  type: integer
                  format: int64
                  nullable: true
    WebAiGenerationJob:
      type: object
      required: [id, customer_id, job_type, status, progress, asset_urls, assetUrls, results, assets]
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        model_code:
          type: string
          nullable: true
        job_type:
          type: string
          enum: [image, video]
        status:
          type: string
          enum: [submitted, running, caching, succeeded, provider_failed, failed, timeout_review, cancelled, refunded]
        progress:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        provider_status:
          type: string
          nullable: true
        provider_job_id:
          type: string
          nullable: true
        provider_request_id:
          type: string
          nullable: true
        result:
          nullable: true
          additionalProperties: true
        results:
          type: array
          items: {}
        asset_urls:
          type: array
          items:
            type: string
        assetUrls:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            $ref: "#/components/schemas/WebAsset"
        workId:
          type: string
          format: uuid
          nullable: true
        charge_mode:
          type: string
        quantity:
          type: integer
          format: int64
        held_minor:
          type: integer
          format: int64
        charged_minor:
          type: integer
          format: int64
        refunded_minor:
          type: integer
          format: int64
        currency:
          type: string
        failure_reason:
          type: string
          nullable: true
        sourceMode:
          type: string
