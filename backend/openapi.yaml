components:
  securitySchemes:
    AdminSession:
      type: apiKey
      in: cookie
      name: admin_session
    AdminRefresh:
      type: apiKey
      in: cookie
      name: admin_refresh
    AdminCsrf:
      type: apiKey
      in: header
      name: X-CSRF-Token
    ClientBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    DeviceId:
      type: apiKey
      in: header
      name: X-Device-Id
    DeviceKeyId:
      type: apiKey
      in: header
      name: X-Device-Key-Id
    DeviceTimestamp:
      type: apiKey
      in: header
      name: X-Timestamp
    DeviceNonce:
      type: apiKey
      in: header
      name: X-Nonce
    DeviceBodySha256:
      type: apiKey
      in: header
      name: X-Body-SHA256
    DeviceSignature:
      type: apiKey
      in: header
      name: X-Signature
    AlertmanagerBearer:
      type: http
      scheme: bearer
      bearerFormat: ALERTMANAGER_WEBHOOK_TOKEN
    AiApiKey:
      type: http
      scheme: bearer
      bearerFormat: EHAI_API_KEY
    ServerApiKey:
      type: http
      scheme: bearer
      bearerFormat: EHSK_SERVER_KEY
    ServerCustomerId:
      type: apiKey
      in: header
      name: X-EntitleHub-Customer-Id
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AppKeyPath:
      name: app_key
      in: path
      required: true
      schema:
        type: string
    FileNamePath:
      name: file_name
      in: path
      required: true
      schema:
        type: string
    SettingKeyPath:
      name: key
      in: path
      required: true
      schema:
        type: string
    FileNameQuery:
      name: file_name
      in: query
      required: false
      schema:
        type: string
    TokenQuery:
      name: token
      in: query
      required: true
      schema:
        type: string
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IncludeHistoryQuery:
      name: include_history
      in: query
      required: false
      schema:
        type: boolean
        default: false
    IdempotencyKeyHeader:
