global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.example.com:587
  smtp_from: alerts@example.com
  smtp_auth_username: alerts@example.com
  smtp_auth_password: replace-with-secret-store-value
  smtp_require_tls: true

route:
  receiver: warning-email
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical-oncall
      repeat_interval: 30m
    - matchers:
        - severity="warning"
      receiver: warning-email

receivers:
  - name: critical-oncall
    webhook_configs:
      - url: https://alert-receiver.example.com/prometheus/critical
        send_resolved: true
    email_configs:
      - to: oncall-critical@example.com
        send_resolved: true

  - name: warning-email
    email_configs:
      - to: oncall-warning@example.com
        send_resolved: true
