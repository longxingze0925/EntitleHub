global:
  resolve_timeout: 5m

route:
  receiver: backend-notification-channels
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: backend-notification-channels
    webhook_configs:
      - url: http://backend:8080/api/internal/alertmanager/webhook
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: replace-with-alertmanager-webhook-token
