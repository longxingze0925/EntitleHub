groups:
  - name: user-admin-backend
    rules:
      - alert: BackendMetricsDown
        expr: up{job="user-admin-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 后端指标端点不可用
          description: Prometheus 无法抓取后端 /metrics 端点。

      - alert: BackendHigh5xxRate
        expr: sum(increase(http_server_errors_total[5m])) / clamp_min(sum(increase(http_requests_total[5m])), 1) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 后端 5xx 错误率超过 1%
          description: 最近 5 分钟内，超过 1% 的后端响应返回了大于等于 500 的状态码。

      - alert: BackendHighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 后端 P95 延迟超过 1 秒
          description: 后端 HTTP P95 延迟已连续 10 分钟高于 1 秒。

      - alert: BackendRateLimitSpike
        expr: sum(increase(rate_limited_total[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 后端限流次数增加
          description: 最近 5 分钟内，超过 20 个请求被限流拒绝。

      - alert: BackendLoginFailureSpike
        expr: sum(increase(login_failures_total[10m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 登录失败次数增加
          description: 最近 10 分钟内，管理员或客户端登录失败次数超过 20 次。

      - alert: ClientRefreshFailureSpike
        expr: sum(increase(client_refresh_failures_total[10m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 客户端刷新失败次数增加
          description: 最近 10 分钟内，客户端刷新失败次数超过 20 次。

      - alert: NonceReplayDetected
        expr: sum(increase(nonce_replay_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 检测到设备签名 nonce 重放
          description: 至少一个重复的设备签名 nonce 已被拒绝。

      - alert: RedisErrorsDetected
        expr: sum(increase(redis_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 检测到 Redis 错误
          description: 后端观察到 Redis 操作失败。

      - alert: NotificationDeliveryFailures
        expr: sum(increase(notification_delivery_failures_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: 检测到通知投递失败
          description: 最近 10 分钟内，至少一个 Alertmanager 通知渠道投递失败。

      - alert: DatabasePoolExhausted
        expr: db_pool_idle_connections == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 数据库连接池没有空闲连接
          description: 后端数据库连接池已连续 5 分钟报告空闲连接数为 0。

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL exporter 不可用
          description: Prometheus 无法抓取 PostgreSQL exporter。

      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL 不可用
          description: PostgreSQL exporter 报告 PostgreSQL 不可用。

      - alert: PostgresConnectionsHigh
        expr: sum(pg_stat_activity_count) / max(pg_settings_max_connections) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL 连接数偏高
          description: PostgreSQL 活跃连接数已连续 10 分钟超过 max_connections 的 80%。

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis exporter 不可用
          description: Prometheus 无法抓取 Redis exporter。

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis 不可用
          description: Redis exporter 报告 Redis 不可用。

      - alert: RedisConnectedClientsHigh
        expr: redis_connected_clients > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Redis 客户端连接数偏高
          description: Redis 客户端连接数已连续 10 分钟高于 100。

      - alert: WorkerJobsFailed
        expr: sum(increase(worker_jobs_failed_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Worker 任务失败
          description: 至少一个 Worker 任务被标记为失败。
